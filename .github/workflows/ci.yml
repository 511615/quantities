name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy src
      - name: Static tests
        run: python -m pytest tests/static -q

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Unit tests
        run: python -m pytest tests/unit -q
      - name: Workbench API tests
        run: python -m pytest tests/webapi -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
      - name: Frontend typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Frontend tests
        working-directory: apps/web
        run: npm run test -- --run
      - name: Frontend build
        working-directory: apps/web
        run: npm run build:ci

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Leakage and reproducibility audits
        run: python -m pytest tests/audit/leakage tests/audit/reproducibility -q

  integration:
    runs-on: ubuntu-latest
    needs:
      - static
      - unit
      - audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Integration tests
        run: python -m pytest tests/integration -q

  compatibility:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -e .[dev]
      - name: Legacy compatibility tests
        run: python -m pytest tests/compatibility -q -m legacy
